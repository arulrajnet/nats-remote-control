name: Docker CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or SHA to build (optional)
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

env:
  IMAGE_NAME: arulrajnet/nats-cli-eval
  DOCKERFILE_PATH: nats-cli/Dockerfile
  BUILD_CONTEXT: nats-cli

jobs:
  docker:
    name: Lint, Build, and Push Multi-Arch Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (event ref)
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.ref == '' }}
        uses: actions/checkout@v4

      - name: Checkout (custom ref)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref != '' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ env.DOCKERFILE_PATH }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail

          short_sha="$(git rev-parse --short=7 HEAD)"
          tags=""

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            pr_number="${{ github.event.pull_request.number }}"
            tags="${{ env.IMAGE_NAME }}:pr-${pr_number}"
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            release_tag="${{ github.event.release.tag_name }}"
            version="${release_tag#v}"

            tags="${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${release_tag}
            ${{ env.IMAGE_NAME }}:${version}"

            # Add major.minor and major tags for stable semantic versions.
            if [[ "${version}" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              major="${BASH_REMATCH[1]}"
              minor="${BASH_REMATCH[2]}"
              tags="${tags}
              ${{ env.IMAGE_NAME }}:${major}.${minor}
              ${{ env.IMAGE_NAME }}:${major}"
            fi
          else
            tags="${{ env.IMAGE_NAME }}:sha-${short_sha}"
          fi

          {
            echo "short_sha=${short_sha}"
            echo "tags<<EOF"
            echo "${tags}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.BUILD_CONTEXT }}
          file: ${{ env.DOCKERFILE_PATH }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
